<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">
        <h2 class="fw-bold">All Users</h2>

        <a href="{{ url_for('dashboard', user_id=current_user.id) }}"
           class="btn btn-outline-dark rounded-pill">
            Back
        </a>
    </div>

    <div class="row g-4">

        {% for u in users %}
        <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 h-100 text-center p-3">

                <div class="mb-3">
                    <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                         style="width:60px;height:60px;">
                        {{ u.username[0].upper() }}
                    </div>
                </div>

                <h5>{{ u.username }}</h5>
                <p class="text-muted small">{{ u.email }}</p>

                <div class="d-flex justify-content-center gap-2">
                    <a href="/update_email/{{ u.id }}" class="btn btn-sm btn-primary rounded-pill">Update</a>
                    <a href="/delete_account/{{ u.id }}" class="btn btn-sm btn-danger rounded-pill">Delete</a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
